items:
  - idx: 7
    name: 고종익
    nameEn: JongikKo
    Occupation: 성악가
    Year: 1915~1995
    Desc: |-
      일본 동경에서 유학
      1935년 일제강점기 시절 조선일보사 주최 콩쿠르에서 테너 이인범과 공동 2위로 입상
      한국의 첫 오페라 <춘희>의 “Douphol” 역 출연에 이어 <카르멘>에서 “Escamillo” 역으로 출연
      6.25 한국전쟁 시 납북
      1995년 평양에서 영면(향년 80세)
    media:
      portrait: /media/figures/JongikKo.jpg
  - idx: 45
    name: 고형주
    nameEn: HyeongjuKo
    Occupation: 성악가
    Year: 1933~2015
    Desc: |-
      고려대학교 법학대학 졸업 후 성악가로 활동
      농업협동조합(농협은행) 직원 및 지점장 역임
      1959년 서울오페라단(고문: 현제명)의 <라 보엠> 한국 초연에서 “Colline” 역으로 데뷔
      1960년 푸리마오페라단의 <세빌리아 이발사> 한국 초연에서 “Figaro” 역 출연
      1960년 고려오페라단 창단 공연 <일 트로바토오레> 한국 초연에서 “Ferrando” 역 출연 이후 <콩쥐팥쥐> 공연에서 “왕” 역으로 출연
      한국 최초의 오페라 <춘희> 공연에서 Germont 역으로 출연한 바리톤 고종익의 아들
      2015년 영면(향년 82세)
    media:
      portrait: /media/figures/HyeongjuKo.jpg
  - idx: 28
    name: 김금환
    nameEn: GeumhwanKim
    Occupation: 성악가
    Year: 1925~2002
    Desc: |-
      1956년 국악사 양성소의 양악 강사 재임
      1959년 푸리마오페라단 창단 공연 <카봘레리아 루스띠까나(카발레리아 루스티카나)> 한국 초연에서 “Turiddu” 역 데뷔
      1960년 고려오페라단(단장: 서영모) 창단공연 <일 트로바토오레> 한국 초연에서 “Manrico” 역으로 출연
      1962년 국립오페라단(단장: 이인범) 창단공연 <왕자 호동> 한국 초연에서 “최리 왕” 역으로 출연 이후 국립오페라단 공연에서 활동
      1984년 영남오페라단을 창단하고 창단공연 <토스카>에서 연출 및 “Cavaradossi” 역 출연하며 영남오페라 공연에서 활동
      영남대학교 음악대학 교수 역임
      2002년 영면(향년 77세)
    media:
      portrait: /media/figures/GeumhwanKim.jpg
  - idx: 40
    name: 김노현
    nameEn: NohyeonKim
    Occupation: 성악가/치과의사
    Year: 1920~
    Desc: |-
      서울대학교 치과 대학 졸업 후 성악에 심취하여 치과의사 겸 성악가로 활동
      1948년 한국 최초의 오페라 <춘희> 공연에서 의사 “Grenvil” 역으로 출연
      1960년 고려오페라단 창단 공연 <일 트로바토오레> 한국 초연에서 “Luna 백작” 역으로 주역 데뷔
      1961년 푸리마오페라단 <마르타> 한국 초연 출연
      1975년 경희대학교 음악대학 작곡과 졸업
      가곡 ‘ 황혼의 노래’ 등 작곡
    media:
      portrait: /media/figures/NohyeonKim.jpg
  - idx: 13
    name: 김대현
    nameEn: DaehyeonKim
    Occupation: 작곡가
    Year: 1917~1985
    Desc: |-
      동요 “자전거”를 중학교 시절에 작곡하면서 자연스럽게 작곡가로 성장
      일본 동경 제국 고등음악학교로 유학
      귀국 후 부친의 독립운동 참여로 중국 신경(현 장춘)에서 활동
      6.25 한국전쟁 시 부산 해군 정훈 음악대원으로 활동하면서 창작오페라 <콩지팟지(콩쥐팥쥐)>, <사랑의 신곡> 등을 발표
      1954년 이후 영화음악 작곡가로 활동하면서 한국 영화음악 발전에 크게 기여함
      서라벌예대 음악 주임 재직 시 중앙대학교로 편입되어 중앙대학교 예술대학 음악 과장 역임
      1985년 영면(향년 68세)
    media:
      portrait: /media/figures/DaehyeonKim.jpg
  - idx: 6
    name: 김복희
    nameEn: BokhuiKim
    Occupation: 성악가
    Year: 1928~
    Desc: |-
      1949년 이화여자대학교 음악대학 졸업
      1950년 오페라 <카르멘> 한국 초연에서 “Carmen” 역으로 데뷔
      미국 뉴욕에서 유학
      1962년 국립오페라단 창단 공연 <왕자 호동>(장일남 작곡)에서 낙랑공주 역으로 출연
      <돈 죠반니>(Elvira 역), <루치아>(Lucia 역), <투란도트>(Turandot 역), <사랑의 묘약>(Adina 역) 등 다양한 역할로 활동
      문인 김기진 선생의 외동딸로서 현재 미국 거주
    media:
      portrait: /media/figures/BokhuiKim.jpg
  - idx: 23
    name: 김생려
    nameEn: SaengryeoKim
    Occupation: 지휘자
    Year: 1912~1995
    Desc: |-
      연희전문학교(현 연세대학교) 문과생으로 입학하고 바이올린 연주자로 학교 밴드부장을 맡아 활동
      재학 중 일본으로 유학하고 다시 연희전문학교로 복귀하여 졸업
      경성방송국 관현악단 악장으로 음악활동
      6.25 한국 전쟁 시 “해군 정훈음악대” 창단을 주도하고 상임 지휘자로 활동
      1955년 해군 정훈음악대 소속 연주자들이 모여 “한국교향악협회”라는 이름으로 오페라 <카르멘>(1955)을 공연한 이후, 한국오페라단(대표: 황병덕) 창단공연 <토스카> 한국 초연을 지휘
      1957년 서울시립교향악단을 창단하고 상임 지휘자로 활동(1961년 퇴임)
      – 1963년 최초의 뮤지컬 단체 “예그린 악단”의 단장
      1964년 “아리랑 민속 예술단”을 창단하고 미국과 유럽 순회연주
      1995년 영면(향년 83세)
    media:
      portrait: /media/figures/SaengryeoKim.jpg
  - idx: 42
    name: 김옥자
    nameEn: OkjaKim
    Occupation: 성악가
    Year: 1929~2019
    Desc: |-
      서울대학교 음악대학 졸업
      1958년 푸리마오페라단 창단공연 <카봘레리아 루스띠까나(카발레리아 루스티카나)> 초연에서 “Santuzza” 역 데뷔한 이후 1960년 <세빌리아의 이발사>(한국초연)에서 “Rosina” 역, 1961년 <마르타>(한국초연)에서 “Martha” 역 출연
      1962년 국립오페라단 창단 단원으로 1962년 <돈 죠반니> 초연에서 “Zerlina” 역 출연
      경희대학교 음악대학 교수 역임
      2019년 영면(향년 90세)
    media:
      portrait: /media/figures/OkjaKim.jpg
  - idx: 3
    name: 김자경
    nameEn: JakyungKim
    Occupation: 성악가
    Year: 1917~1999
    Desc: |-
      이화여전(현 이화여자대학교) 음악과 졸업
      한국의 첫 오페라 <춘희> 공연에서 “Violetta” 역으로 데뷔
      <춘희> 한국 초연 이후 미국 뉴욕(줄리아드 음악학교)으로 유학
      1958년 귀국 후 이화여자대학교 교수로 봉직
      1968년 김자경오페라단 창단하고 한국 오페라의 대중화와 발전에 헌신
      1999년 영면(향년 82세)
    media:
      portrait: /media/figures/JakyungKim.jpg
  - idx: 31
    name: 김학근
    nameEn: HakgeunKim
    Occupation: 성악가
    Year: 1918~1985
    Desc: |-
      일본 동경에서 유학
      1958년 한국오페라단 창단 공연 <토스카> 한국 초연에서 “Scarpia” 역으로 주역 데뷔 이후 한국오페라단의 공연 <팔리앗찌(팔리아치)>(한국 초연) “Tonio” 역, <카르멘>에서 “Escamillo” 역, <오세로(오텔로)>(한국 초연)에서 “Iago” 역으로 활동
      1962년 국립오페라단 창단 단원으로 국립오페라단의 <돈 죠반니>(한국 초연)에서 “Don Giovanni” 역으로 출연 이후 미국으로 유학하고 미국에서 거주
      경희대학교 음악대학 교수 역임
      1985년 영면(향년 67세)
    media:
      portrait: /media/figures/HakgeunKim.jpg
  - idx: 32
    name: 김학상
    nameEn: HaksangKim
    Occupation: 성악가
    Year: ''
    Desc: |-
      광복 전후 경성후생 실내악단과 고려교향악협회 회원으로 활동한 성악가(테너)
      1950년 현제명 작곡 <춘향전> 초연에서 “방자” 역 출연
      1954년 현제명 작곡 <왕자 호동> 한국 초연 공연에 출연
      1957년 서울오페라단(고문: 현제명) 창단 공연 <춘희>에 단역으로 출연 이후 1958년 <춘향전>, <라 보엠> 한국 초연 공연에서 연출
      서울대학교 음악대학 교수 역임
    media:
      portrait: /media/figures/HaksangKim.jpg
  - idx: 5
    name: 김혜란
    nameEn: HyeranKim
    Occupation: 성악가
    Year: 1920~2005
    Desc: |-
      일본 무사시노 음대에서 유학
      오페라 <카르멘> 한국 초연에서 “Carmen” 역으로 데뷔
      현제명 작곡 <춘향전> 초연에서 “월매” 역으로 출연
      오스트리아 비엔나에서 유학
      숙명여자대학교 교수 역임
      2005년 영면(향년 85세)
    media:
      portrait: /media/figures/HyeranKim.jpg
  - idx: 38
    name: 김희조
    nameEn: HuijoKim
    Occupation: 지휘자/작곡가
    Year: 1920~2001
    Desc: |-
      피아노, 바이올린, 비올라 등의 악기를 배우면서 작곡과 국악을 독학으로 연구 및 활동
      1948년 이후 10년간 육군 본부 국악대장 역임
      서울시립교향악단 부 지휘자 역임
      1958년 KBS 관현악단 지휘자 역임
      1960년 고려오페라단(단장: 서영모) 창단공연 <일 트로바토오레> 한국초연 지휘
      1961년 푸리마오페라단(단장: 한경진) <마르타> 공연 지휘
      1965년 고려오페라단 <춘향전> 공연 지휘
      86 아시안게임 음악 총감독
      88 올림픽 개폐회식 마스게임 음악 작곡
      경희대학교 음악대학 교수 역임(1957~1962)
      서울예술대학 국악과 교수 역임
      서울대학교 음악대학 김덕기 명예교수(지휘) 부친
      2001년 영면(향년 81세)
    media:
      portrait: /media/figures/HuijoKim.jpg
  - idx: 47
    name: 박용구
    nameEn: YongguPark
    Occupation: 연출가
    Year: 1914~2016
    Desc: |-
      일본 대학 예술학과와 니혼 고등음악학교에서 유학
      1960년대에서 1970년대에 음악·무용 평론가로 활동
      1966년 “교양의 음악” 전 5권 집필 및 출판 이후 많은 저서 집필
      1967년 최초의 뮤지컬 단체 “예그린 악단” 단장 역임
      한국 음악 팬클럽 대표 및 한국 예술 평론가 협의회 회장 역임
      1960년 한국오페라단의 <오텔로> 초연 공연 연출
      2016년 영면(향년 102세)
    media:
      portrait: /media/figures/YongguPark.jpg
  - idx: 44
    name: 변성엽
    nameEn: SeongyeopByeon
    Occupation: 성악가
    Year: 1929~2018
    Desc: |-
      연희대학교 영문과 졸업 후 일본 유학 성악 전공
      1959년 푸리마오페라단 창단 공연 <카봘레리아 루스띠까나(카발레리아 루스티카나)> 한국 초연에서 “Alfio” 역으로 데뷔한 이후 1960년 <세빌리아의 이발사> 한국 초연에서 “Figaro” 역 출연
      1962년 국립오페라단 창단 단원으로 창단공연 <왕자 호동> 한국 초연에서 “장초 장군” 역 출연 이후 1964년 <루치아> 한국 초연에서 “Enrico” 역 출연
      1968년 김자경오페라단 창단공연 <춘희> 공연에서 “Germont” 역 출연
      1968년 푸리마오페라단 <사랑의 묘약> 한국 초연에서 “Belcore” 역으로 출연
      숭의여자전문대학 교수 역임
      2018년 영면(향년 89세)
    media:
      portrait: /media/figures/SeongyeopByeon.jpg
  - idx: 37
    name: 서영모
    nameEn: YeongmoSeo
    Occupation: 성악가
    Year: 1919~1999
    Desc: |-
      1941년 일본 동경에서 유학
      1962년 숙명여자대학교 음악대학 교수 
      1958년 한국오페라단 창단 공연 <토스카> 한국 초연에서 “Scarpia” 역으로 데뷔
      1960년 고려오페라단을 창단하고 창단 공연 <돈 죠반니>(Masetto 역), <루치아>(Raimondo 역), <가면무도회>(Silvano 역) 등 출연
      1999년 영면(향년 80세)
    media:
      portrait: /media/figures/YeongmoSeo.jpg
  - idx: 43
    name: 신인철
    nameEn: IncheolShin
    Occupation: 성악가
    Year: 1936~
    Desc: |-
      서울대학교 음악대학 졸업
      1960년 푸리마오페라단 공연 <세빌리아의 이발사> 한국 초연에서 “Almaviva 백작” 역으로 데뷔
      이탈리아 로마로 유학
      귀국 후 국립오페라단 단원으로 1968년 <파우스트> 출연 이후 국립오페라단 공연에서 활동
      단국대학교 음악대학 교수 역임
    media:
      portrait: /media/figures/IncheolShin.jpg
  - idx: 21
    name: 안형일
    nameEn: HyeongilAn
    Occupation: 성악가
    Year: 1926~
    Desc: |-
      서울대학교 음악대학 졸업
      1958년 서울오페라단(고문: 현제명) <리고렡(리골렛토)> 공연에서 “Duca” 역으로 데뷔
